{{define "title"}}Edit Site{{end}}

{{define "content"}}
<h1>Edit Site</h1>

<div class="card" style="max-width:600px;">
  <form method="POST" action="/admin/sites/{{.Site.ID}}">
    <div class="form-group">
      <label for="name">Site Name</label>
      <input type="text" id="name" name="name" required value="{{.Site.Name}}">
    </div>
    <div class="form-group">
      <label for="url">Homepage URL</label>
      <input type="url" id="url" name="url" required value="{{.Site.URL}}">
    </div>
    <div class="form-group">
      <label for="fetch_interval_hours">Fetch Interval (hours)</label>
      <input type="number" id="fetch_interval_hours" name="fetch_interval_hours"
             min="0.5" step="0.5" value="{{.Site.FetchIntervalHours}}">
    </div>
    <div class="form-group">
      <label for="keywords_exclude">Exclude Keywords</label>
      <input type="text" id="keywords_exclude" name="keywords_exclude"
             value="{{.Site.KeywordsExclude}}"
             placeholder="crypto, nft, sponsored">
      <div class="hint">Comma-separated. Articles containing these words are skipped.</div>
    </div>
    <div class="form-group">
      <label>Enabled</label>
      <select name="enabled">
        <option value="1"{{if .Site.Enabled}} selected{{end}}>Yes</option>
        <option value="0"{{if not .Site.Enabled}} selected{{end}}>No</option>
      </select>
    </div>
    <div style="display:flex;gap:10px;">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="/admin/sites" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{{end}}
