{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rssBridge — {{block "title" .}}Admin{{end}}</title>
<link rel="icon" type="image/x-icon" href="/static/icons/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/static/icons/android-chrome-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/static/icons/android-chrome-512x512.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --border:   #2a2d3a;
    --accent:   #6c8ebf;
    --accent2:  #4a7fa5;
    --text:     #c9d1d9;
    --muted:    #6e7681;
    --danger:   #cf6679;
    --success:  #56a64b;
    --warning:  #c9a227;
    --radius:   8px;
    --font:     'Segoe UI', system-ui, -apple-system, sans-serif;
    --mono:     'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent2); text-decoration: underline; }

  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 24px;
    height: 52px;
  }

  .brand {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    margin-right: 32px;
    letter-spacing: -0.3px;
    text-decoration: none;
  }

  .nav-link {
    color: var(--muted);
    padding: 0 14px;
    height: 52px;
    display: inline-flex;
    align-items: center;
    border-bottom: 2px solid transparent;
    font-size: 13px;
    transition: color 0.15s, border-color 0.15s;
    text-decoration: none;
  }

  .nav-link:hover,
  .nav-link.active {
    color: var(--text);
    border-bottom-color: var(--accent);
    text-decoration: none;
  }

  .nav-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .rss-link {
    background: var(--accent);
    color: #fff !important;
    padding: 5px 12px;
    border-radius: var(--radius);
    font-size: 12px;
    font-weight: 600;
    text-decoration: none;
  }
  .rss-link:hover { background: var(--accent2); text-decoration: none; }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  h1 { font-size: 22px; font-weight: 600; margin-bottom: 24px; color: var(--text); }
  h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    text-align: left;
    padding: 10px 12px;
    color: var(--muted);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 11px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-success { background: rgba(86,166,75,0.15); color: var(--success); }
  .badge-muted   { background: rgba(110,118,129,0.15); color: var(--muted); }
  .badge-danger  { background: rgba(207,102,121,0.15); color: var(--danger); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s, background 0.15s;
    text-decoration: none;
  }
  .btn:hover { opacity: 0.85; text-decoration: none; }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-danger  { background: var(--danger); color: #fff; }
  .btn-ghost   {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  form.inline { display: inline; }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  input[type=text], input[type=url], input[type=number], select, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 9px 12px;
    font-size: 14px;
    font-family: var(--font);
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  textarea { resize: vertical; min-height: 70px; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    text-align: center;
  }
  .stat-card .value {
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .stat-card .label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .empty { color: var(--muted); font-style: italic; padding: 24px 0; text-align: center; }

  .fetch-result {
    display: inline-block;
    margin-left: 8px;
    font-size: 12px;
    color: var(--success);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .fetch-result.visible { opacity: 1; }
  .fetch-result.error { color: var(--danger); }

  .actions { display: flex; gap: 6px; align-items: center; }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-header h2 { margin-bottom: 0; }
</style>
</head>
<body>
<nav>
  <a href="/admin" class="brand">⟳ rssBridge</a>
  <a href="/admin" class="nav-link{{if eq .Page "dashboard"}} active{{end}}">Dashboard</a>
  <a href="/admin/sites" class="nav-link{{if eq .Page "sites"}} active{{end}}">Sites</a>
  <a href="/admin/settings" class="nav-link{{if eq .Page "settings"}} active{{end}}">Settings</a>
  <a href="/admin/log" class="nav-link{{if eq .Page "log"}} active{{end}}">Log</a>
  <div class="nav-right">
    <a href="/rss" class="rss-link" target="_blank">RSS Feed</a>
  </div>
</nav>
<main>
  {{block "content" .}}{{end}}
</main>
</body>
</html>
{{end}}
